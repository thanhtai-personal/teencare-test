name: SonarQube Analysis (Non-Blocking)

on:
  push:
    branches:
      - main
      - master
      - dev
  pull_request:
    branches:
      - main
      - master
      - dev
  workflow_dispatch:

jobs:
  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if Sonar secrets are missing
        if: ${{ env.SONAR_TOKEN == '' || env.SONAR_HOST_URL == '' }}
        run: |
          echo "SONAR_TOKEN or SONAR_HOST_URL is missing."
          echo "Skipping SonarQube scan (non-blocking by design)."

      - name: SonarQube Scan (non-blocking)
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
