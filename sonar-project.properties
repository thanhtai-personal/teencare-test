# Monorepo SonarQube configuration
sonar.projectKey=clothe-rental-management
sonar.projectName=Clothe Rental Management
sonar.projectVersion=1.0

sonar.sourceEncoding=UTF-8
sonar.sources=apps/web/src,apps/mobile/src,apps/mobile/app
sonar.inclusions=**/*.ts,**/*.tsx,**/*.js,**/*.jsx
sonar.exclusions=**/node_modules/**,**/.next/**,**/out/**,**/build/**,**/dist/**,**/coverage/**,**/.expo/**,**/.expo-shared/**,**/android/**,**/ios/**,**/*.d.ts,**/generated/**,**/sql/**

# Keep scanner non-blocking in CI; scan results still appear in SonarQube.
sonar.qualitygate.wait=false

# Complexity policy is managed in SonarQube Quality Profile:
# - Rule key: javascript:S3776 (and typescript:S3776 if available)
# - Cognitive Complexity threshold: 15
# - Severity: set to warning-level (e.g. Minor)
